{% extends "base.html" %}

{% block title %}Iniciar sesión — SmartGastro{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <span class="logo-icon">🍔</span>
            <h1 class="logo-title">SmartGastro</h1>
            <p class="logo-subtitle">Sistema de gestión para foodtrucks</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="admin@smartgastro.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
        </form>
    </div>
</div>
{% endblock %}
